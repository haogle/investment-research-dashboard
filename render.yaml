services:
  - type: web
    name: investment-research-dashboard
    runtime: python
    buildCommand: pip install -r requirements.txt && python warmup_cache.py
    startCommand: streamlit run dashboard.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
